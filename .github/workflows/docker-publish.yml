name: Build and push Docker image

# push 到 main（或打 v* tag）时，自动构建 amd64 镜像并推送到 GHCR。
# 用仓库内置的 GITHUB_TOKEN 登录，无需额外配置 secret。
# 只构建 amd64：部署盒子为 x86_64，无需 arm64。避免 QEMU 交叉构建下
# esbuild 安装期自检 (esbuild --version) 触发 ETXTBSY 导致 npm ci 失败。
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # 推送到 GHCR 必需
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          # github.repository = deng-wei/ModelPing；metadata-action 自动转小写 → ghcr.io/deng-wei/modelping
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
