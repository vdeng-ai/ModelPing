name = "modelping"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat", "assets_navigation_prefers_asset_serving"]

# 前端静态资源绑定。非 /api 路由由 worker 交给 ASSETS；
# single-page-application 模式让未命中文件回退到 index.html。
[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

# 可选：目标主机白名单（非敏感，可放这里）。
[vars]
# ALLOWED_HOSTS = "api.openai.com,api.anthropic.com,generativelanguage.googleapis.com"
# Cloudflare 免费版推荐只把配置类私有状态写入 KV，测试历史留在浏览器，降低 KV 写入。
PRIVATE_STATE_SCOPE = "config"
# Workers 没有 Docker 版的网络层 egress 防火墙，公网部署建议默认开启应用层私网拦截。
BLOCK_PRIVATE_HOSTS = "1"

# 访问口令请用 secret，勿写入此文件：
#   wrangler secret put APP_PASSWORD

# 设置持久化（presets，跨设备共享）。先创建 KV 命名空间再填入 id：
#   wrangler kv namespace create SETTINGS_KV
# 然后取消下面注释并把 id 填进去（绑定名固定为 SETTINGS_KV，store 据此自动启用 cf-kv 驱动）：
[[kv_namespaces]]
binding = "SETTINGS_KV"
id = "262b5e4e02794a27909718a738e7206a"
