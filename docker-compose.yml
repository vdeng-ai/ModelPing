services:
  modelping:
    # 默认用 GitHub Actions 手动或 v* tag 构建并推到 GHCR；不随 main push 自动更新。
    # 首次推送后到 GitHub 仓库 Packages 把该镜像设为 Public，Watchtower 才能免登录拉取。
    # 想在盒子上本地构建，把下面一行换成 `build: .`。
    image: ghcr.io/deng-wei/modelping:latest
    ports:
      - "8787:8787"
    environment:
      # —— 访问控制（公网暴露务必设置）——
      # 访问口令：真实口令写在同目录 .env（不入库），仓库不含明文。未设置则启动报错。
      APP_PASSWORD: "${APP_PASSWORD:?请在 .env 设置 APP_PASSWORD}"
      # 注：不用 ALLOWED_HOSTS 白名单（自定义 host 居多）。防 SSRF/内网访问改在网络层做，见下方注释。
      # 可选：CORS 允许来源（逗号分隔，* 表示全开）。缺省同源（不下发 ACAO，跨站 JS 调不动 /api）。
      # CORS_ORIGIN: "https://your-frontend.example"

      # —— 设置持久化（presets 跨设备共享，不存任何 apiKey）——
      # Docker 默认用 file 驱动。把路径指到挂载卷，重建容器不丢失。
      # 首次卷为空时 /presets.json 会自动回退到镜像内置默认预设。
      STORAGE_DRIVER: "file"
      SETTINGS_FILE: "/data/presets.json"
      # 强烈建议单独设置长随机 PRIVATE_STATE_SECRET；未设时才回退 STATUS_SECRET/APP_PASSWORD。
      PRIVATE_STATE_SECRET: "${PRIVATE_STATE_SECRET:?请在 .env 设置 PRIVATE_STATE_SECRET（长随机值）}"
      PRIVATE_STATE_FILE: "/app/data/private-state.enc"
      # 旧状态页密钥兼容项；仅在 private-state 未设密钥时作为解密 fallback。
      STATUS_SECRET: "${STATUS_SECRET:-}"

      PORT: "8787"
    volumes:
      # 持久化 presets：宿主命名卷 → 容器 /data（SETTINGS_FILE 指向此处）。
      - presets-data:/data
      # 持久化私有工作态密文。
      - ./data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    labels:
      # 仅让 Watchtower 监控带此标签的容器。
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      # 固定子网，便于防火墙按源地址精确拦截（见 deploy/firewall-egress.sh）。
      - egress

  # 自动更新：定期检查 GHCR 新镜像，拉取并重启 modelping，清理旧镜像。
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 300   # 每 5 分钟检查一次
    restart: unless-stopped

networks:
  # modelping 专用网络，固定子网 172.31.66.0/24。
  # 防火墙据此拦截「该子网 → 内网私有段」的流量，只放行公网（见 deploy/firewall-egress.sh）。
  egress:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.66.0/24

volumes:
  presets-data:
